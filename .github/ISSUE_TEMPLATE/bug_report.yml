name: Bug report
description: Report something broken in the product or docs
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include browser, viewport and relevant account role when useful.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and how serious is it?
    validations:
      required: false
