name: Feature request
description: Propose a product, community or governance improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: need
    attributes:
      label: Need
      description: What real user or community need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact areas
      options:
        - label: Moderation or safety
        - label: Privacy or security
        - label: Governance
        - label: Inclusion or accessibility
        - label: Prompt bank or AI workflow
        - label: Developer experience
